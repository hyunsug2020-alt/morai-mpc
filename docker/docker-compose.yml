version: "3.8"

services:
  moraimpc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: moraimpc:humble
    container_name: moraimpc
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../src:/home/moraimpc/src:rw
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    stdin_open: true
    tty: true
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /home/moraimpc/install/setup.bash 2>/dev/null || true &&
        ros2 launch moraimpc morai_full.launch.py
      "
