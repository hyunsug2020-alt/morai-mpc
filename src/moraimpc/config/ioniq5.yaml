# ============================================================
# Ioniq 5 SUV 차량 파라미터 + 전체 시스템 설정
# ============================================================

# 차량 제원
vehicle:
  wheelbase:        3.000
  vehicle_length:   4.635
  vehicle_width:    1.890
  vehicle_height:   1.605
  vehicle_mass:     2100.0
  max_steer_deg:    35.0
  kappa_max:        0.234   # tan(35°)/3.0
  max_velocity:     30.0
  min_velocity:    -3.0
  max_accel:        3.0
  max_decel:       -5.0

# MORAI 토픽
morai:
  ego_topic:    "/Ego_topic"
  ctrl_topic:   "/ctrl_cmd"
  imu_topic:    "/imu"
  gps_topic:    "/gps"
  cam_topic:    "/image_raw"

# LTV-MPC (전진, Gutjahr 2017)
ltv_mpc:
  prediction_horizon:    20
  time_step:             0.2
  wheelbase:             3.0
  weight_position:      20.0
  weight_heading:        8.0
  weight_curvature:      1.5
  weight_input:          1.0
  max_velocity:         30.0
  min_velocity:          0.5
  kappa_min_delta:      -0.234
  kappa_max_delta:       0.234
  kappa_blend_alpha:     0.15
  lateral_bound:         0.30
  w_lateral_slack_lin:   500.0
  w_lateral_slack_quad: 5000.0
  publish_accel_cmd:     true

# RTI-NMPC (후진 주차, 2410.12170v1.pdf)
rti_nmpc:
  N:                20
  Ts:               0.1
  w_px:            15.0
  w_py:            15.0
  w_psi:            8.0
  w_v:              2.0
  w_kappa:          1.0
  w_av:             0.5
  w_akappa:         1.0
  parking_velocity:  0.5
  v_max:            0.5
  v_min:           -1.5

# Hybrid A* (하이브리드 논문 3편)
hybrid_astar:
  xy_resolution:    0.20
  theta_deg:        5.0
  wheelbase:        3.0
  max_steer_deg:   35.0
  vehicle_length:   4.635
  vehicle_width:    1.890
  use_reed_shepp:   true
  w_reverse:        2.5
  w_obstacle:      80.0

# ESKF (2406.06427v3.pdf)
eskf:
  sigma_accel:       0.1
  sigma_gyro:        0.01
  sigma_accel_bias:  0.001
  sigma_gyro_bias:   0.0001
  sigma_gps_pos:     1.0
  sigma_gps_vel:     0.2
  sigma_heading:     0.05
  gravity:           9.81
  utm_zone:          52

# 주차 매니저
parking:
  trigger_dist:       20.0
  done_dist:           0.3
  done_angle_deg:      5.0
  approach_speed:      3.0
  timeout_sec:       180.0
